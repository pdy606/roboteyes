<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서빙 로봇 똑똑한 뇌 - 프리미엄 서빙로봇</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 30px; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-size: 1.25rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .menu-item:hover { background: rgba(99, 102, 241, 0.2); border-color: var(--primary); transform: translateY(-3px); }
        .menu-item span { display: block; font-size: 1.1rem; font-weight: 600; }
        .menu-item .price { font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; }

        .cart-section { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; }
        .order-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 20px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .orders-list { height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; }
        .order-card {
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 10px;
            border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center;
        }
        .order-info span { color: var(--text-muted); font-size: 0.8rem; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; background: rgba(99,102,241,0.2); color: var(--primary-light); }

        .robot-vision {
            background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 20px; padding: 25px; margin-top: 0;
        }
        .file-btn { font-size: 0.75rem; padding: 5px 10px; background: rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; }
        .vision-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: #10b981; color: white; font-weight: 600; cursor: pointer; margin-top: 15px;
        }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 25px; border-radius: 30px;
            font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1>🍳 똑똑한 매장 서빙로봇 v2.0</h1>
            <h2>🛒 메뉴 주문</h2>
            <div class="menu-grid">
                <div class="menu-item" onclick="addToCart('제육볶음', 12000)">
                    <span>제육볶음</span>
                    <div class="price">₩12,000</div>
                </div>
                <div class="menu-item" onclick="addToCart('돈까스', 11000)">
                    <span>돈까스</span>
                    <div class="price">₩11,000</div>
                </div>
                <div class="menu-item" onclick="addToCart('김치찌개', 9000)">
                    <span>김치찌개</span>
                    <div class="price">₩9,000</div>
                </div>
                <div class="menu-item" onclick="addToCart('된장찌개', 9000)">
                    <span>된장찌개</span>
                    <div class="price">₩9,000</div>
                </div>
            </div>
            <div class="cart-section">
                <h2>장바구니</h2>
                <div id="cartList"></div>
                <div style="text-align: right; margin-top: 15px; font-weight: 600; color: #818cf8;">
                    TOTAL: <span id="totalPrice">0</span>원
                </div>
                <button class="order-btn" onclick="submitOrder()">주문하기</button>
            </div>
        </div>
        <div class="glass-card">
            <h2>🥘 주문 대기열</h2>
            <div class="orders-list" id="ordersList"></div>
            <div class="robot-vision">
                <h2 style="color:#10b981; align-self: flex-start;">🤖 로봇 배차 (AI Vision)</h2>
                <input type="file" id="robotImage" accept="image/*" class="file-btn" style="width:100%;" onchange="previewImageLocally(this)">
                <img id="previewImage" style="max-height: 200px; max-width: 100%; margin-top: 15px; border-radius: 10px; display: none; object-fit: contain; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                <button class="vision-btn" onclick="simulateRobotServe()">배차 지시</button>
                <div id="visionResult" style="margin-top:15px; font-weight:600; width: 100%;"></div>
            </div>
        </div>
    </div>
    <div id="toast">알림</div>
    <script>
        let cart = {}; let tableNum = Math.floor(Math.random() * 6) + 1;
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 3000); }
        function addToCart(menu, price) { if(!cart[menu]) cart[menu] = { qty: 0, price: price }; cart[menu].qty++; renderCart(); }
        function renderCart() { const list = document.getElementById('cartList'); let total = 0; list.innerHTML = Object.entries(cart).map(([name, item]) => { total += item.qty * item.price; return '<div class=\"cart-item\"><span>' + name + ' x ' + item.qty + '</span><span>' + (item.qty * item.price).toLocaleString() + '원</span></div>'; }).join(''); document.getElementById('totalPrice').innerText = total.toLocaleString(); }
        async function submitOrder() { if(Object.keys(cart).length === 0) return showToast("메뉴를 골라주세요!"); const ordersArray = Object.entries(cart).map(([name, item]) => ({ menu_name: name, quantity: item.qty })); const res = await fetch('/order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ table_number: tableNum, orders: ordersArray }) }); if(res.ok) { showToast(tableNum + "번 테이블 주문 완료!"); cart = {}; renderCart(); fetchOrders(); } }
        async function fetchOrders() { const res = await fetch('/orders'); const data = await res.json(); const list = document.getElementById('ordersList'); list.innerHTML = data.pending_orders.map(o => '<div class=\"order-card\"><div class=\"order-info\"><strong>T' + o.table_number + ' - ' + o.menu_name + '</strong></div><div class=\"status-badge\">대기중</div></div>').join(''); }
        
        function previewImageLocally(input) {
            const file = input.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const img = document.getElementById('previewImage');
                img.src = url;
                img.style.display = 'block';
            }
        }
        
        async function simulateRobotServe() { const file = document.getElementById('robotImage').files[0]; if(!file) return showToast("시뮬레이션할 음식 사진을 선택해주세요!"); const formData = new FormData(); formData.append('file', file); document.getElementById('visionResult').innerText = "🧠 AI 확인 중..."; const res = await fetch('/serve', { method: 'POST', body: formData }); const data = await res.json(); document.getElementById('visionResult').innerHTML = '<div style=\"color:#10b981;\">인식 결과: ' + data.ai_vision_result + '</div><div style=\"font-size:0.8rem;\">' + data.message + '</div>'; fetchOrders(); }
        setInterval(fetchOrders, 3000); fetchOrders();
    </script>
</body>
</html>
